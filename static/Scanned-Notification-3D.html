<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrueNotice — Verified Notification (3D)</title>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.184.0/build/three.module.js",
    "three/addons/controls/OrbitControls.js": "https://unpkg.com/three@0.184.0/examples/jsm/controls/OrbitControls.js",
    "three/addons/exporters/OBJExporter.js": "https://unpkg.com/three@0.184.0/examples/jsm/exporters/OBJExporter.js",
    "three/addons/exporters/GLTFExporter.js": "https://unpkg.com/three@0.184.0/examples/jsm/exporters/GLTFExporter.js"
  },
  "integrity": {
    "https://unpkg.com/three@0.184.0/build/three.module.js": "sha384-8FCZ1eVO6it4+pbec2aDtnTrwjWXZLJRC+MAGCIPDgsYnUrl/E0A2YlF8ioMKI/J",
    "https://unpkg.com/three@0.184.0/build/three.core.js": "sha384-dw2ooPewaEIrAgl6oFDBmmBWCE9oW9LxRGcfwZ0hLvEprzo202wXl7vCYHRlSnOT",
    "https://unpkg.com/three@0.184.0/examples/jsm/controls/OrbitControls.js": "sha384-4rziNxOBZKQ69i+w+f89KJ55TCYquwchVbByQwmaOeIOXdOU2PLDn3kOfXHwIJC9",
    "https://unpkg.com/three@0.184.0/examples/jsm/exporters/OBJExporter.js": "sha384-nbwtoZENJD3Vq+ACK0CuGQdPMuDWHkamC2KJD70EV5nfg6jQjfppKOea07YJN+N3",
    "https://unpkg.com/three@0.184.0/examples/jsm/exporters/GLTFExporter.js": "sha384-VofkvpG6HERhFCYbsUOHeNXBCqID2nfqkQqnVzE1jc/oPcz+qJ13ADdXH08hE+cQ"
  }
}
</script>
<style>
  html, body { margin: 0; height: 100%; background: #0c1526; }
  three-d-stage:not(:defined) { visibility: hidden; }
  three-d-stage { display: block; width: 100vw; height: 100vh; }
</style>
</head>
<body>
<three-d-stage name="truenotice-verified-notification" background="#0c1526" autorotate></three-d-stage>
<script src="./three-d-stage.js"></script>
<script type="module">
const stage = document.querySelector('three-d-stage');
const { THREE } = await stage.ready;

// ── Materials (small shared palette) ───────────────────────────
const matPaper  = new THREE.MeshStandardMaterial({ name: 'paper',      color: 0xf4f5f8, roughness: 0.85, metalness: 0.0 });
const matAccent = new THREE.MeshStandardMaterial({ name: 'accent_blue',color: 0x1d4ed8, roughness: 0.45, metalness: 0.15 });
const matInk    = new THREE.MeshStandardMaterial({ name: 'ink',        color: 0x2b3648, roughness: 0.7,  metalness: 0.0 });
const matInkSoft= new THREE.MeshStandardMaterial({ name: 'ink_soft',   color: 0x9aa6b8, roughness: 0.8,  metalness: 0.0 });
const matBrass  = new THREE.MeshStandardMaterial({ name: 'brass_seal', color: 0xe4c26a, roughness: 0.3,  metalness: 0.4 });
const matBase   = new THREE.MeshStandardMaterial({ name: 'plinth',     color: 0x18243f, roughness: 0.55, metalness: 0.25 });
const matScan   = new THREE.MeshStandardMaterial({ name: 'scan_beam',  color: 0x0a3648, roughness: 0.4, metalness: 0.0,
                                                   emissive: 0x38bdf8, emissiveIntensity: 1.6, transparent: true, opacity: 0.55 });

// ── Rounded-rectangle shape helper ─────────────────────────────
function roundedRect(w, h, r) {
  const s = new THREE.Shape();
  const x = -w / 2, y = -h / 2;
  s.moveTo(x + r, y);
  s.lineTo(x + w - r, y);
  s.quadraticCurveTo(x + w, y, x + w, y + r);
  s.lineTo(x + w, y + h - r);
  s.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  s.lineTo(x + r, y + h);
  s.quadraticCurveTo(x, y + h, x, y + h - r);
  s.lineTo(x, y + r);
  s.quadraticCurveTo(x, y, x + r, y);
  return s;
}

const model = new THREE.Group();
model.name = 'verified_notification';

// ── The document sheet (extruded rounded rect) ─────────────────
const W = 0.30, H = 0.42, depth = 0.010;
const sheetGeo = new THREE.ExtrudeGeometry(roundedRect(W, H, 0.014), {
  depth, bevelEnabled: true, bevelThickness: 0.0025, bevelSize: 0.0025, bevelSegments: 2, curveSegments: 16,
});
sheetGeo.translate(0, 0, -depth / 2);
const sheet = new THREE.Mesh(sheetGeo, matPaper);
sheet.name = 'document_sheet';
sheet.castShadow = true; sheet.receiveShadow = true;
model.add(sheet);

const frontZ = depth / 2 + 0.0025;   // just above the front bevel
function plate(w, h, mat, x, y, name, d = 0.004) {
  const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
  m.position.set(x, y, frontZ + d / 2 - 0.001);
  m.name = name; m.castShadow = true;
  model.add(m);
  return m;
}

// Header band (accent) with a small emblem notch
plate(W - 0.05, 0.052, matAccent, 0, H / 2 - 0.055, 'header_band', 0.006);
// emblem square on the header
const emblem = plate(0.03, 0.03, matPaper, -(W - 0.05) / 2 + 0.03, H / 2 - 0.055, 'header_emblem', 0.008);

// Title lines
plate(0.20, 0.016, matInk, -0.03, H / 2 - 0.115, 'title_line_1');
plate(0.13, 0.012, matInkSoft, -0.065, H / 2 - 0.142, 'title_line_2');

// Body text lines (varied widths)
const bodyWidths = [0.235, 0.235, 0.19, 0.235, 0.155];
bodyWidths.forEach((w, i) => {
  plate(w, 0.009, matInkSoft, -(W - 0.05) / 2 + w / 2 + 0.001, 0.055 - i * 0.028, 'body_line_' + (i + 1));
});

// Small "official" data-matrix block (bottom-left)
const dm = new THREE.Group(); dm.name = 'data_matrix';
const pat = [[1,0,1,1],[0,1,1,0],[1,1,0,1],[1,0,1,0]];
const cell = 0.011;
pat.forEach((row, r) => row.forEach((v, c) => {
  if (!v) return;
  const b = new THREE.Mesh(new THREE.BoxGeometry(cell, cell, 0.004), matInk);
  b.position.set(-0.10 + c * cell, -0.115 - r * cell, frontZ + 0.001);
  b.name = `dm_${r}_${c}`; dm.add(b);
}));
model.add(dm);

// ── Verification seal (brass ring + check) bottom-right ────────
const seal = new THREE.Group(); seal.name = 'verification_seal';
seal.position.set(0.085, -0.125, frontZ + 0.004);
const ring = new THREE.Mesh(new THREE.TorusGeometry(0.036, 0.006, 20, 48), matBrass);
ring.name = 'seal_ring'; ring.castShadow = true; seal.add(ring);
// check mark from two rounded arms
const armShort = new THREE.Mesh(new THREE.BoxGeometry(0.007, 0.020, 0.007), matBrass);
armShort.name = 'check_short'; armShort.position.set(-0.011, -0.006, 0.004); armShort.rotation.z = Math.PI / 4; seal.add(armShort);
const armLong = new THREE.Mesh(new THREE.BoxGeometry(0.007, 0.036, 0.007), matBrass);
armLong.name = 'check_long'; armLong.position.set(0.008, 0.004, 0.004); armLong.rotation.z = -Math.PI / 5; seal.add(armLong);
model.add(seal);

// ── Scan beam crossing the document ────────────────────────────
const beam = new THREE.Mesh(new THREE.BoxGeometry(W + 0.10, 0.016, 0.05), matScan);
beam.name = 'scan_beam'; beam.position.set(0, 0.02, frontZ + 0.028);
model.add(beam);
// bright edge rails on the beam
[-1, 1].forEach((s) => {
  const rail = new THREE.Mesh(new THREE.BoxGeometry(W + 0.10, 0.003, 0.052),
    new THREE.MeshStandardMaterial({ name: 'scan_rail', color: 0x0a3648, emissive: 0x7dd3fc, emissiveIntensity: 2.2, roughness: 0.4 }));
  rail.position.set(0, 0.02 + s * 0.009, frontZ + 0.028); rail.name = 'scan_rail_' + (s > 0 ? 'top' : 'bot');
  model.add(rail);
});

// ── Plinth base (grounds the standing sheet) ───────────────────
const baseGeo = new THREE.ExtrudeGeometry(roundedRect(0.18, 0.10, 0.02), {
  depth: 0.03, bevelEnabled: true, bevelThickness: 0.004, bevelSize: 0.004, bevelSegments: 2, curveSegments: 8,
});
baseGeo.rotateX(-Math.PI / 2);   // lie flat
const base = new THREE.Mesh(baseGeo, matBase);
base.name = 'plinth'; base.castShadow = true; base.receiveShadow = true;
model.add(base);
// slot lip on the plinth (accent)
const lip = new THREE.Mesh(new THREE.BoxGeometry(0.14, 0.008, 0.016), matAccent);
lip.name = 'plinth_lip'; lip.position.set(0, 0.034, 0);
model.add(lip);

// ── Position: sheet stands in the plinth slot, base at y=0 ─────
// Sheet currently centered at origin; lift so its bottom sits in the plinth.
sheet.position.y = H / 2 + 0.02;
model.children.forEach((c) => { if (c !== sheet && c !== base && c !== lip) c.position.y += H / 2 + 0.02; });
// tilt the whole document back a touch for presence
const doc = new THREE.Group(); doc.name = 'document_assembly';

stage.setObject(model);
</script>
</body>
</html>
